<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRASVASE — Gestor de Colecciones</title>
<style>
  :root {
    --green:       #00ff41;
    --green-dim:   #00cc33;
    --green-dark:  #003310;
    --green-glow:  0 0 8px #00ff4166;
    --green-glow2: 0 0 16px #00ff4188;
    --bg:          #080808;
    --bg2:         #0d0d0d;
    --bg3:         #111;
    --border:      #1a2e1a;
    --border-hi:   #00ff4133;
    --text:        #b0b0b0;
    --text-hi:     #e8e8e8;
    --red:         #ff3333;
    --red-dim:     #cc2222;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green-dark); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 1.5rem;
    padding: 0 1.5rem;
    height: 52px;
    background: var(--bg);
    border-bottom: 1px solid var(--border-hi);
    box-shadow: 0 2px 20px #000a;
  }
  .logo {
    font-size: 1.1rem; font-weight: 700; letter-spacing: .2em;
    color: var(--green);
    text-shadow: var(--green-glow2);
    white-space: nowrap;
  }
  .logo span { color: var(--text); font-weight: 400; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    padding: .6rem 1.5rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    display: flex; align-items: center; gap: .4rem;
  }
  .stat-label { color: #555; font-size: .75rem; text-transform: uppercase; letter-spacing: .1em; }
  .stat-value { color: var(--green); font-size: .95rem; font-weight: 700; }
  .stat-value.missing { color: #ffcc00; text-shadow: 0 0 8px #ffcc0088; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    padding: .75rem 1.5rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .search-wrap {
    position: relative; flex: 1; min-width: 180px; max-width: 360px;
  }
  .search-wrap svg {
    position: absolute; left: .6rem; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: #444; pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text-hi); padding: .4rem .75rem .4rem 2rem;
    border-radius: 3px; outline: none; font-family: inherit; font-size: .85rem;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type="search"]:focus {
    border-color: var(--green-dim);
    box-shadow: var(--green-glow);
  }

  .btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .4rem .9rem; border-radius: 3px; border: 1px solid;
    font-family: inherit; font-size: .8rem; font-weight: 600;
    cursor: pointer; letter-spacing: .05em; white-space: nowrap;
    transition: all .15s;
    text-transform: uppercase;
  }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  .btn-primary {
    background: var(--green); border-color: var(--green); color: #000;
  }
  .btn-primary:not(:disabled):hover {
    background: #fff; border-color: #fff; color: #000;
    box-shadow: var(--green-glow2);
  }
  .btn-ghost {
    background: transparent; border-color: var(--green-dim); color: var(--green);
  }
  .btn-ghost:not(:disabled):hover {
    background: var(--green-dark); box-shadow: var(--green-glow);
  }
  .btn-danger {
    background: transparent; border-color: var(--red); color: var(--red);
  }
  .btn-danger:not(:disabled):hover {
    background: #2a0000; box-shadow: 0 0 8px #ff333366;
  }

  .spacer { flex: 1; }

  .sel-count {
    color: var(--green-dim); font-size: .8rem;
    min-width: 6ch; text-align: right;
  }

  /* ── Table ── */
  .table-wrap {
    overflow: auto;
    height: calc(100vh - 52px - 42px - 54px);  /* header + stats + toolbar */
  }
  table {
    width: 100%; border-collapse: collapse;
    table-layout: fixed;
  }
  colgroup col:nth-child(1)  { width: 36px; }   /* checkbox */
  colgroup col:nth-child(2)  { width: 22%; }     /* artist */
  colgroup col:nth-child(3)  { width: 26%; }     /* album */
  colgroup col:nth-child(4)  { width: 6%;  }     /* year */
  colgroup col:nth-child(5)  { width: 12%; }     /* genre */
  colgroup col:nth-child(6)  { width: 16%; }     /* label */
  colgroup col:nth-child(7)  { width: 88px; }    /* actions */

  thead th {
    position: sticky; top: 0; z-index: 10;
    background: #0a1a0a;
    color: var(--green-dim); font-size: .7rem; text-transform: uppercase; letter-spacing: .12em;
    font-weight: 600; padding: .55rem .7rem;
    border-bottom: 1px solid var(--border-hi);
    text-align: left; white-space: nowrap;
    user-select: none; cursor: pointer;
  }
  thead th:first-child { cursor: default; text-align: center; }
  thead th.sorted-asc::after  { content: ' ↑'; color: var(--green); }
  thead th.sorted-desc::after { content: ' ↓'; color: var(--green); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:hover   { background: #111a11; }
  tbody tr.checked { background: #0a1e0a; }
  tbody tr.checked:hover { background: #0d2a0d; }

  td {
    padding: .45rem .7rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  td:first-child { text-align: center; vertical-align: middle; }

  .td-artist { color: var(--text-hi); font-weight: 500; }
  .td-title  { color: var(--green); }
  .td-year   { color: #888; }
  .td-genre  { color: #6a9e6a; font-size: .8rem; }
  .td-label  { color: #666; font-size: .8rem; }

  /* Custom checkbox */
  input[type="checkbox"] { display: none; }
  .cb-box {
    display: inline-block; width: 14px; height: 14px;
    border: 1px solid #333; border-radius: 2px;
    background: var(--bg);
    transition: all .1s; cursor: pointer;
    position: relative; flex-shrink: 0;
  }
  input[type="checkbox"]:checked + .cb-box {
    background: var(--green); border-color: var(--green);
    box-shadow: var(--green-glow);
  }
  input[type="checkbox"]:checked + .cb-box::after {
    content: '';
    position: absolute; left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 2px solid #000; border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  label.cb-label { display: flex; align-items: center; justify-content: center; cursor: pointer; }

  /* Actions cell */
  .actions { display: flex; gap: .35rem; align-items: center; }
  .btn-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 3px; border: 1px solid;
    background: transparent; cursor: pointer; transition: all .15s;
    flex-shrink: 0;
  }
  .btn-icon svg { width: 13px; height: 13px; }
  .btn-icon-copy  { border-color: #225522; color: var(--green-dim); }
  .btn-icon-copy:hover  { border-color: var(--green); color: var(--green); background: var(--green-dark); box-shadow: var(--green-glow); }
  .btn-icon-del   { border-color: #3a1111; color: #663333; }
  .btn-icon-del:hover   { border-color: var(--red); color: var(--red); background: #1a0000; }

  /* Empty state */
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 1rem; color: #333; padding: 3rem;
    text-align: center;
  }
  .empty svg { width: 48px; height: 48px; color: #222; }
  .empty p { font-size: .9rem; line-height: 1.8; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; z-index: 999;
    background: #000d;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  #loading-overlay.active { opacity: 1; pointer-events: all; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--green-dark);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    box-shadow: var(--green-glow2);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toasts ── */
  #toasts {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    z-index: 1000; display: flex; flex-direction: column; gap: .5rem;
    pointer-events: none;
  }
  .toast {
    display: flex; align-items: center; gap: .6rem;
    padding: .6rem 1rem; border-radius: 4px; font-size: .8rem;
    border: 1px solid; max-width: 340px;
    animation: slideIn .25s ease-out;
    pointer-events: all;
  }
  .toast svg { width: 14px; height: 14px; flex-shrink: 0; }
  .toast-ok    { background: #0a1a0a; border-color: var(--green-dim); color: var(--green); }
  .toast-err   { background: #1a0a0a; border-color: var(--red);       color: var(--red); }
  .toast-info  { background: #0a0a1a; border-color: #5555ff;           color: #8888ff; }
  @keyframes slideIn {
    from { transform: translateX(110%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* ── Confirm modal ── */
  .modal-bg {
    position: fixed; inset: 0; z-index: 200;
    background: #000b;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-bg.active { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg3);
    border: 1px solid var(--border-hi);
    box-shadow: 0 0 40px #00ff4122;
    border-radius: 6px; padding: 2rem;
    min-width: 340px; max-width: 480px;
    display: flex; flex-direction: column; gap: 1.2rem;
  }
  .modal h3 { color: var(--green); font-size: .95rem; letter-spacing: .1em; text-transform: uppercase; }
  .modal p  { color: var(--text); font-size: .85rem; line-height: 1.7; }
  .modal-actions { display: flex; gap: .6rem; justify-content: flex-end; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">TRASVASE <span>// col manager</span></div>
  <div class="spacer"></div>
  <button class="btn btn-ghost" id="btn-refresh" title="Recargar datos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Actualizar
  </button>
</header>

<!-- ── Stats ── -->
<div class="stats-bar">
  <div class="stat">
    <span class="stat-label">Colección 1</span>
    <span class="stat-value" id="s-c1">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Colección 2</span>
    <span class="stat-value" id="s-c2">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Artistas</span>
    <span class="stat-value" id="s-artists">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Faltan en C1</span>
    <span class="stat-value missing" id="s-missing">—</span>
  </div>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="search" id="search" placeholder="Filtrar artista, álbum, género…">
  </div>

  <button class="btn btn-ghost" id="btn-select-all">Seleccionar todo</button>
  <button class="btn btn-ghost" id="btn-deselect-all">Limpiar</button>

  <div class="spacer"></div>

  <span class="sel-count" id="sel-count"></span>

  <button class="btn btn-primary" id="btn-copy-sel" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    Copiar selección
  </button>
</div>

<!-- ── Table ── -->
<div class="table-wrap" id="table-wrap">
  <table id="albums-table">
    <colgroup>
      <col><col><col><col><col><col><col>
    </colgroup>
    <thead>
      <tr>
        <th>
          <label class="cb-label">
            <input type="checkbox" id="check-all">
            <span class="cb-box"></span>
          </label>
        </th>
        <th data-col="artist">Artista</th>
        <th data-col="title">Álbum</th>
        <th data-col="year">Año</th>
        <th data-col="genre">Género</th>
        <th data-col="label">Sello</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="albums-body"></tbody>
  </table>
  <div class="empty" id="empty-state" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2
               c2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2
               4.2 4.2 0 0 0-.1-3.2S12 4.5 9.5 6a13.3 13.3 0 0 0-7 0
               C0 4.5 0 7.2 0 7.2a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0-1.4 13.7
               c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/>
    </svg>
    <p>No se encontraron álbumes ausentes<br>o no hay resultados para el filtro aplicado.</p>
  </div>
</div>

<!-- ── Loading ── -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- ── Toasts ── -->
<div id="toasts"></div>

<!-- ── Confirm modal ── -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Confirmar</h3>
    <p id="modal-body"></p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancelar</button>
      <button class="btn btn-danger" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allAlbums    = [];
let filtered     = [];
let selected     = new Set();
let sortCol      = 'artist';
let sortDir      = 1;  // 1 asc, -1 desc
let confirmCb    = null;

// ── DOM refs ───────────────────────────────────────────────────────────────
const tbody       = document.getElementById('albums-body');
const emptyState  = document.getElementById('empty-state');
const searchInput = document.getElementById('search');
const checkAll    = document.getElementById('check-all');
const selCountEl  = document.getElementById('sel-count');
const btnCopySel  = document.getElementById('btn-copy-sel');
const loading     = document.getElementById('loading-overlay');
const toastsCont  = document.getElementById('toasts');
const modalBg     = document.getElementById('modal-bg');
const modalTitle  = document.getElementById('modal-title');
const modalBody   = document.getElementById('modal-body');
const modalConfirm= document.getElementById('modal-confirm');
const modalCancel = document.getElementById('modal-cancel');

// ── Loader ─────────────────────────────────────────────────────────────────
function setLoading(on) {
  loading.classList.toggle('active', on);
}

// ── Toast ──────────────────────────────────────────────────────────────────
const ICONS = {
  ok:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
  err:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
  info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
};
function toast(msg, type = 'ok', duration = 4000) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `${ICONS[type]} <span>${msg}</span>`;
  toastsCont.appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ── Confirm modal ──────────────────────────────────────────────────────────
function confirm(title, body, onConfirm, danger = true) {
  modalTitle.textContent   = title;
  modalBody.textContent    = body;
  modalConfirm.className   = `btn ${danger ? 'btn-danger' : 'btn-primary'}`;
  modalConfirm.textContent = danger ? 'Confirmar' : 'Aceptar';
  confirmCb = onConfirm;
  modalBg.classList.add('active');
}
modalConfirm.addEventListener('click', () => {
  modalBg.classList.remove('active');
  if (confirmCb) { confirmCb(); confirmCb = null; }
});
modalCancel.addEventListener('click', () => {
  modalBg.classList.remove('active');
  confirmCb = null;
});
modalBg.addEventListener('click', e => {
  if (e.target === modalBg) { modalBg.classList.remove('active'); confirmCb = null; }
});

// ── API ────────────────────────────────────────────────────────────────────
async function api(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ── Fetch & render ─────────────────────────────────────────────────────────
async function loadStats() {
  const s = await api('/api/stats');
  document.getElementById('s-c1').textContent      = s.collection1.toLocaleString();
  document.getElementById('s-c2').textContent      = s.collection2.toLocaleString();
  document.getElementById('s-artists').textContent = s.artists.toLocaleString();
  document.getElementById('s-missing').textContent = s.missing.toLocaleString();
}

async function loadAlbums() {
  setLoading(true);
  try {
    const [albums] = await Promise.all([api('/api/albums/missing'), loadStats()]);
    allAlbums = albums;
    selected.clear();
    applyFilter();
  } catch (e) {
    toast(`Error al cargar: ${e.message}`, 'err');
  } finally {
    setLoading(false);
  }
}

function applyFilter() {
  const q = searchInput.value.toLowerCase().trim();
  filtered = q
    ? allAlbums.filter(a =>
        (a.artist || '').toLowerCase().includes(q) ||
        (a.title  || '').toLowerCase().includes(q) ||
        (a.genre  || '').toLowerCase().includes(q) ||
        (a.label  || '').toLowerCase().includes(q)
      )
    : [...allAlbums];
  sortFiltered();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let va = a[sortCol] ?? '';
    let vb = b[sortCol] ?? '';
    if (sortCol === 'year') { va = va || 0; vb = vb || 0; return sortDir * (va - vb); }
    return sortDir * String(va).localeCompare(String(vb), 'es', { sensitivity: 'base' });
  });
  renderTable();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTable() {
  if (!filtered.length) {
    tbody.innerHTML = '';
    emptyState.style.display = '';
    updateSelUI();
    return;
  }
  emptyState.style.display = 'none';

  const rows = filtered.map(a => {
    const chk = selected.has(a.id) ? 'checked' : '';
    return `
    <tr data-id="${a.id}" class="${selected.has(a.id) ? 'checked' : ''}">
      <td>
        <label class="cb-label">
          <input type="checkbox" class="row-cb" data-id="${a.id}" ${chk}>
          <span class="cb-box"></span>
        </label>
      </td>
      <td class="td-artist" title="${esc(a.artist)}">${esc(a.artist)}</td>
      <td class="td-title"  title="${esc(a.title)}">${esc(a.title)}</td>
      <td class="td-year">${a.year || '—'}</td>
      <td class="td-genre" title="${esc(a.genre)}">${esc(a.genre) || '—'}</td>
      <td class="td-label" title="${esc(a.label)}">${esc(a.label) || '—'}</td>
      <td>
        <div class="actions">
          <button class="btn-icon btn-icon-copy" data-id="${a.id}" title="Copiar a C1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
          <button class="btn-icon btn-icon-del" data-id="${a.id}" title="Eliminar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
          </button>
        </div>
      </td>
    </tr>`;
  }).join('');

  tbody.innerHTML = rows;
  updateSelUI();
}

function updateSelUI() {
  const n = selected.size;
  selCountEl.textContent   = n ? `${n} seleccionado${n !== 1 ? 's' : ''}` : '';
  btnCopySel.disabled      = n === 0;
  checkAll.checked         = filtered.length > 0 && filtered.every(a => selected.has(a.id));
  checkAll.indeterminate   = n > 0 && !checkAll.checked;
}

// ── Row events (delegated) ──────────────────────────────────────────────────
tbody.addEventListener('change', e => {
  const cb = e.target.closest('.row-cb');
  if (!cb) return;
  const id = +cb.dataset.id;
  cb.checked ? selected.add(id) : selected.delete(id);
  const row = tbody.querySelector(`tr[data-id="${id}"]`);
  if (row) row.classList.toggle('checked', cb.checked);
  updateSelUI();
});

tbody.addEventListener('click', e => {
  const copyBtn = e.target.closest('.btn-icon-copy');
  const delBtn  = e.target.closest('.btn-icon-del');

  if (copyBtn) {
    const id = +copyBtn.dataset.id;
    const album = allAlbums.find(a => a.id === id);
    confirm(
      'Copiar álbum',
      `¿Copiar "${album?.title}" de ${album?.artist} a la Colección 1?`,
      () => copyAlbums([id]),
      false
    );
  }

  if (delBtn) {
    const id = +delBtn.dataset.id;
    const album = allAlbums.find(a => a.id === id);
    confirm(
      'Eliminar álbum',
      `¿Eliminar permanentemente "${album?.title}" de ${album?.artist}?\nEsta acción borrará los archivos del disco.`,
      () => deleteAlbum(id),
      true
    );
  }
});

// ── Sort ───────────────────────────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    sortFiltered();
  });
});

// ── Select all / deselect ──────────────────────────────────────────────────
checkAll.addEventListener('change', () => {
  filtered.forEach(a => checkAll.checked ? selected.add(a.id) : selected.delete(a.id));
  renderTable();
});
document.getElementById('btn-select-all').addEventListener('click', () => {
  filtered.forEach(a => selected.add(a.id));
  renderTable();
});
document.getElementById('btn-deselect-all').addEventListener('click', () => {
  selected.clear();
  renderTable();
});

// ── Search ─────────────────────────────────────────────────────────────────
let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(applyFilter, 200);
});

// ── Refresh ────────────────────────────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', loadAlbums);

// ── Copy selected ──────────────────────────────────────────────────────────
btnCopySel.addEventListener('click', () => {
  const ids = [...selected];
  confirm(
    'Copiar selección',
    `¿Copiar ${ids.length} álbum${ids.length !== 1 ? 'es' : ''} a la Colección 1?`,
    () => copyAlbums(ids),
    false
  );
});

async function copyAlbums(ids) {
  setLoading(true);
  try {
    const results = await api('/api/albums/copy', {
      method: 'POST',
      body: JSON.stringify({ ids }),
    });
    const ok  = results.filter(r => r.success);
    const err = results.filter(r => !r.success);

    if (ok.length)  toast(`${ok.length} álbum${ok.length !== 1 ? 'es' : ''} copiado${ok.length !== 1 ? 's' : ''} correctamente.`, 'ok');
    if (err.length) toast(`${err.length} error${err.length !== 1 ? 'es' : ''}: ${err.map(r => r.error).join(', ')}`, 'err', 7000);

    selected.clear();
    await loadAlbums();
  } catch (e) {
    toast(`Error al copiar: ${e.message}`, 'err');
    setLoading(false);
  }
}

async function deleteAlbum(id) {
  setLoading(true);
  try {
    await api(`/api/albums/${id}`, { method: 'DELETE' });
    selected.delete(id);
    toast('Álbum eliminado.', 'ok');
    await loadAlbums();
  } catch (e) {
    toast(`Error al eliminar: ${e.message}`, 'err');
    setLoading(false);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
loadAlbums();
</script>
</body>
</html>
